name: Hassfest

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate Home Assistant metadata
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Run Hassfest
        uses: home-assistant/actions/hassfest@master
