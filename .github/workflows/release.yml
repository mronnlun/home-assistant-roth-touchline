name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest

    steps:
      - name: Create or update release pull request
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Check out released version
        if: steps.release.outputs.release_created == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag_name }}

      - name: Set up Python
        if: steps.release.outputs.release_created == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build HACS release archive
        if: steps.release.outputs.release_created == 'true'
        working-directory: custom_components/roth_touchline
        run: |
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZIP_DEFLATED, ZipFile

          root = Path(".")
          with ZipFile("../../../roth_touchline.zip", "w", ZIP_DEFLATED) as archive:
              for path in sorted(root.rglob("*")):
                  if path.is_file():
                      archive.write(path, path.relative_to(root))
          PY

      - name: Upload HACS release archive
        if: steps.release.outputs.release_created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag_name }}
        run: gh release upload "$RELEASE_TAG" roth_touchline.zip --clobber
