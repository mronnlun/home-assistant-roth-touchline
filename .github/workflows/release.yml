name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    name: Publish merged change
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Bump integration version
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          change_file="$RUNNER_TEMP/pull-request.txt"
          gh api \
            -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" \
            --jq '.[0] // empty | .title + "\n\n" + (.body // "")' \
            > "$change_file"
          if [[ ! -s "$change_file" ]]; then
            echo "No pull request is associated with this push; skipping release."
            echo "release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python scripts/semantic_release.py \
            --manifest custom_components/roth_touchline/manifest.json \
            --change-file "$change_file" \
            --github-output "$GITHUB_OUTPUT"
          echo "release=true" >> "$GITHUB_OUTPUT"

      - name: Commit and tag version
        if: steps.release.outputs.release == 'true'
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add custom_components/roth_touchline/manifest.json
          git commit -m "chore(release): v${VERSION} [skip ci]"
          git pull --rebase origin main
          git tag -a "v${VERSION}" -m "v${VERSION}"
          git push origin HEAD:main "v${VERSION}"

      - name: Build HACS release archive
        if: steps.release.outputs.release == 'true'
        run: >-
          python scripts/build_release_archive.py
          --source custom_components/roth_touchline
          --output roth_touchline.zip

      - name: Publish GitHub release
        if: steps.release.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          gh release create "v${VERSION}" roth_touchline.zip \
            --verify-tag \
            --title "v${VERSION}" \
            --generate-notes
