name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Quality and tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Validate JSON metadata
        run: |
          python -m json.tool hacs.json > /dev/null
          python -m json.tool custom_components/roth_touchline/manifest.json > /dev/null
          python -m json.tool custom_components/roth_touchline/strings.json > /dev/null

      - name: Validate HACS repository
        uses: hacs/action@main
        with:
          category: integration
          comment: false
          ignore: brands

      - name: Check formatting
        run: python -m black --check custom_components tests tester.py

      - name: Check import order
        run: python -m isort --check-only custom_components tests tester.py

      - name: Run Flake8
        run: python -m flake8 custom_components tests tester.py

      - name: Run mypy
        run: python -m mypy custom_components/roth_touchline

      - name: Run Pylint
        run: python -m pylint --jobs=1 custom_components/roth_touchline tests tester.py

      - name: Run tests
        run: python -m pytest
